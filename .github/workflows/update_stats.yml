name: Update GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # 統計カードの生成
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=sotashimozono&show_icons=true&theme=radical
          path: profile/stats.svg
          token: ${{ secrets.PAT_TOKEN }}

      # 言語カードの生成
      - name: Generate Language Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=sotashimozono&layout=compact&theme=radical
          path: profile/top-langs.svg
          token: ${{ secrets.PAT_TOKEN }}

      # 画像をリポジトリにコミット
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update GitHub stats images" || exit 0
          git push
